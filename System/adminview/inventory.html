<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Management</title>

  <link rel="stylesheet" href="styles/inventory.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="dashboard-body">
  <div class="dashboard-wrapper">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="brand">
          <img class="profile-picture" src="pictures/profile.webp ">
          <h2 class="user">Admin</h2>
          <p>Welcome, admin</p>
        </div>
        <nav class="nav-menu">
          <a href="admin_homepage.html" class="nav-item">
            <i class="fa-solid fa-table-columns"></i> Dashboard
          </a>
          <a href="inventory.html" class="nav-item active">
            <i class="fa-solid fa-box-archive"></i> Inventory
          </a>
          <a href="monitoring.html" class="nav-item">
            <i class="fa-solid fa-chart-line"></i> Monitoring
          </a>
          <a href="studentinfo.html" class="nav-item">
            <i class="fa-solid fa-user-group"></i> Student Information
          </a>
        </nav>
      </div>
      <a href="/System/homepage/loginpage.html" class="logout-btn">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
      </a>

    </aside>
    <main class="main-content">
      <header class="content-header">
        <h1>Inventory Management</h1>
        <p>Track and manage school resources</p>
      </header>
      <div class="button-container">
        <button class="add-item-button" id="openButton"><span class="add-icon"><i class="fa fa-plus"
              aria-hidden="true" ></i></span><strong>
            Add Item
          </strong></button>
      </div>

      <div class="add-button-modal" id="addButton">
            <div class="container-content">
               
              <h2><i class="fa-solid fa-box-archive"></i> Add New Item</h2>
              <p>Fill in the details below to add a new item to the inventory.</p>
              <form id="addItemForm">
                <div class="form-grid">
                <label for="itemName">Item Name:</label>
                <input type="text" id="itemName" name="itemName" required>

                <label for="category">Category:</label>
                <select id="category" name="category" required>
                  <option value="">Select category</option>
                  <option value="kitchen-equipmet">Kitchen Equipment</option>
                  <option value="kitchen-tools">Kitchen Tools</option>
                  <option value="beverage-equipment">Beverage Equipment</option>
                  <option value="tableware">Tableware</option>
                  <option value="furniture">Furniture</option>
                  <option value="linen">Linen</option>
                  <option value="software">Software</option>
                  <option value="books">Books</option>
                </select>

                <label for="quantity">Quantity:</label>
                <input type="number" id="quantity" name="quantity" required>

                <label for="status">Status:</label>
                <select id="status" name="status" required>
                  <option value="">Select status</option>
                  <option value="available">Available</option>
                  <option value="borrowed">Borrowed</option>
                  <option value="maintenance">Maintenance</option>
                </select>
                <button type="submit">Add Item</button>
                <button id="closeButton" type="button">Cancel</button>
              </form>
              </div>
            </div>
          </div>
      <section class="inventory-grid">
        <div class="search-container">
          <div class="search-wrapper">
            <span class="material-symbols-outlined search-icon"></span>
            <input type="text" class="search-input" placeholder="&#x1F50D; Search by student name, ID, or item...">
          </div>
      </section>
      </section>
      <section class="inventory-container">
        <div class="inventory-card">
          <h4>All Items</h4>
          <table class="inventory-table">
            <thead>
              <tr class ="inventory-table-header">
                <th>Item Name</th>
                <th>Category</th>
                <th>Quantity</th>
                <th>Status</th>
                <th>Location</th>
                <th>Actions</th>
              </tr>
            </thead>
          </table>
        </div>
        <div></div>
      </section>
    </main>
  </div>
  <script src="adminjs/inventory.js"> </script>
</body>

</html>
