<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Requisition Management</title>

  <link rel="stylesheet" href="styles/monitoring.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="dashboard-body">

  <div class="dashboard-wrapper">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="brand">
          <img class="profile-picture" src="pictures/profile.webp ">
          <h2 class="user">Admin</h2>
          <p>Welcome, admin</p>
        </div>

        <nav class="nav-menu">
          <a href="homepage.html" class="nav-item">
            <i class="fa-solid fa-table-columns"></i> Dashboard
          </a>
          <a href="inventory.html" class="nav-item">
            <i class="fa-solid fa-box-archive"></i> Inventory
          </a>
          <a href="monitoring.html" class="nav-item active">
            <i class="fa-solid fa-chart-line"></i> Monitoring
          </a>
          <a href="studentinfo.html" class="nav-item">
            <i class="fa-solid fa-user-group"></i> Student Information
          </a>
        </nav>
      </div>

      <a href="loginpage.html" class="logout-btn">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
      </a>
    </aside>

    <main class="main-content">
      <header class="content-header">
        <h1>Requesitioin Monitoring</h1>
        <p>Review and approve requests</p>
      </header>
      <section class="monitoring-grid">
        <div class="monitoring-card">
          <div class="monitoring-header"><strong>Pending Approval</strong></div>
          <div class="stat-value"></div>
        </div>
        <div class="monitoring-card">
          <div class="monitoring-header"><strong>Approved</strong></div>
          <div class="monitoring-value"></div>
        </div>
        <div class="monitoring-card">
          <div class="monitoring-header"><strong>Rejected</strong></i>
          </div>
          <div class="monitoring-value"></div>
        </div>
      </section>
      <section class="requisition-grid">
        <div class="requisition-card">
          <h4>Requisition Forms</h4>
            <table class="requisition-table">
              <thead>
                <tr class="requisition-table-header">
                  <th>Request ID</th>
                  <th>Requestor</th>
                  <th>Professor</th>
                  <th>Department</th>
                  <th>Item Requested</th>
                  <th>Quantity</th>
                  <th>Date</th>
                  <th>Urgency</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
            </table>
        </div>
      </section>

    </main>

  </div>

</body>

</html>
