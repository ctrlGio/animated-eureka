<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="/System/studentview/styles/student_dashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
  <div class="dashboard-body">
    <div class="dashboard-wrapper">
      <aside class="sidebar">
        <div class="sidebar-top">
          <div class="brand">
            <img class="profile-picture" src="/System/studentview/pictures/profile.webp">
            <h2 class="user" id="sidebarName">Student</h2>
            <p id="sidebarWelcome">Welcome, student</p>
          </div>
          <nav class="nav-menu">
            <a href="/System/studentview/student_homepage.html" class="nav-item active">
              <i class="fa-solid fa-table-columns"></i> Dashboard
            </a>
            <a href="/System/studentview/student_browse.html" class="nav-item">
              <i class="fa-solid fa-box-archive"></i> Browse Equipment
            </a>
            <a href="/System/studentview/student_borrow.html" class="nav-item">
              <i class="fa-solid fa-file"></i> My Borrows
            </a>
            <a href="/System/studentview/student_request.html" class="nav-item">
              <i class="fa-solid fa-file"></i> Request Equipment
            </a>
          </nav>
        </div>
        <a href="#" class="logout-btn" id="logoutBtn">
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
      </aside>

      <main class="main-content">
        <header class="content-header">
          <h1>Dashboard</h1>
          <p>Welcome to your BSHM equipment portal!</p>
        </header>

        <section class="stats-grid">
          <div class="stat-card">
            <div class="stat-header"><span>My Borrows</span><i class="fa-solid fa-box-archive"></i></div>
            <div class="stat-value" id="stat-borrows">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-header"><span>Overdue Items</span><i class="fa-solid fa-exclamation-triangle"></i></div>
            <div class="stat-value" id="stat-overdue">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-header"><span>Pending Requests</span><i class="fa-solid fa-file"></i></div>
            <div class="stat-value" id="stat-requests">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-header"><span>Good Standing</span><i class="fa-solid fa-check-circle"></i></div>
            <div class="stat-value" id="stat-standing">—</div>
          </div>
        </section>

        <div class="dashboard-grid">
          <section class="panel">
            <h3>Current Borrowings</h3>
            <div id="current-borrowings-list">
              <p style="color:#888;">Loading...</p>
            </div>
          </section>

          <section class="panel">
            <h3>Recent Requisitions</h3>
            <div id="recent-requests-list">
              <p style="color:#888;">Loading...</p>
            </div>
          </section>
        </div>

      </main>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/System/studentview/studentjs/auth.js"></script>
  <script src="/System/studentview/studentjs/student_homepage.js"></script>
  <script src="/System/studentview/studentjs/logout.js"></script>
</body>

</html>
