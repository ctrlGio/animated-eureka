<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — BSHM</title>
  <link rel="stylesheet" href="/System/homepage/styles/login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

  <div class="login-container">
    <div class="login-header">
      <h2>Set New Password</h2>
    </div>

    <div id="reset-message" class="form-message hidden"></div>

    <!-- Verifying token state -->
    <div id="verifying-state">
      <p style="text-align:center; color:#64748b; font-size:14px;">
        <i class="fa-solid fa-spinner fa-spin"></i> Verifying your reset link...
      </p>
    </div>

    <!-- Form shown after token is valid -->
    <form id="reset-form" class="login-form hidden">
      <div class="input-group">
        <label>New Password</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="new-password" placeholder="Minimum 8 characters" required minlength="8">
          <button type="button" class="toggle-pw" aria-label="Show password" data-target="new-password">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
      </div>
      <div class="input-group">
        <label>Confirm New Password</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="confirm-password" placeholder="Re-enter new password" required minlength="8">
          <button type="button" class="toggle-pw" aria-label="Show password" data-target="confirm-password">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="sign-in-btn" id="reset-btn">Update Password</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/System/homepage/reset-password.js"></script>
</body>

</html>
