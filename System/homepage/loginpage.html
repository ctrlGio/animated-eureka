<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="/System/homepage/styles/login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

  <nav class="exit">
    <a href="/System/homepage/website.html"><i class="fa-solid fa-arrow-left"></i>
    Back to Home</a>
  </nav>

  <div class="login-container">
    <div class="login-header">
      <h2>BSHM Monitoring System</h2>
    </div>

    <form class="login-form">
      <div class="input-group">
        <label for="username">Username</label>
        <div class="input-wrapper">
          <i class="fa-regular fa-user"></i>
          <input type="text" id="username" placeholder="Enter username" maxlength="20" required>
        </div>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <div class="input-wrapper" id="password-wrapper">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="password" placeholder="Enter password" maxlength="20" required>
          <button type="button" id="toggle-password" aria-label="Show password">
            <i class="fa-regular fa-eye" id="eye-icon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="sign-in-btn">Sign In</button>
    </form>

    <div class="login-footer">
      <p>Demo credentials:</p>
      <p>Username: <strong>admin</strong> | Password: <strong>admin123</strong></p>
      <p>Username: <strong>student</strong> | Password: <strong>student123</strong></p>
      <p>Username: <strong>instructor</strong> | Password: <strong>instructor123</strong></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="login.js"></script>
</body>

</html>
